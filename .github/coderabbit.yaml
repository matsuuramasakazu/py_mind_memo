# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ja-JP"

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
    auto_incremental_review: false

  instructions:
    system_instructions: |
      あなたはシニアソフトウェアエンジニアとしてコードレビューを行います。
      技術的に重要な問題を優先して指摘してください。

      各レビューコメントは必ず以下のJSON形式を含めてください：

      ```json
      {
        "priority": "P0|P1|P2|P3",
        "reason": "...",
        "fix": "...",
        "file": "...",
        "line": null
      }
      ```
      ※ `line` は整数または null を指定してください。

      冗長な説明や挨拶は不要です。

    summarize_instructions: |
      以下の形式でMarkdown出力してください：
      ## 変更の概要
      - コンポーネントごとの変更点
      ## AIエージェントへの指示
      - 優先的に確認・修正すべきファイルパスとその理由

  path_filters:
    - "!bin/**"
    - "!docs/**"
    - "!dist/**"
    - "!images/**"
    - "!**/__pycache__/**"
    - "!build/**"
